<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
{% if page.url == '/' %}
<script>
(function () {
  try {
    if (sessionStorage.getItem("hp-entered") === "true") return;
  } catch (e) {}
  document.documentElement.classList.add("pre-enter");
})();
</script>
{% endif %}
</head>
<body>
  {% include nav.html %}
  <main>
    {{ content }}
  </main>
  <footer class="site-footer">
    {% include motif.html %}
    <p class="footer-note">Hope &amp; Patrick &middot; May 22, 2027</p>
  </footer>
  <script src="{{ '/assets/js/countdown.js' | relative_url }}" defer></script>
</body>
</html>
